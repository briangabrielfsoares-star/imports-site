<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire Imports</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>EMPIRE IMPORTS</h1>
  <div id="cart">🛒 <span id="cartCount">0</span></div>
</header>

<section class="hero">
  <h2>Importados premium 🔥</h2>
  <p>Roupas, tênis e perfumes com estilo</p>
</section>

<section class="produtos">

  <div class="card">
    <h3>Nike Tech</h3>
    <p>Moletom premium</p>
    <span>R$ 149</span>
    <button onclick="addToCart('Nike Tech')">Adicionar</button>
  </div>

  <div class="card">
    <h3>Adidas Set</h3>
    <p>Conjunto esportivo</p>
    <span>R$ 129</span>
    <button onclick="addToCart('Adidas Set')">Adicionar</button>
  </div>

  <div class="card">
    <h3>Perfume Importado</h3>
    <p>Fragrância premium</p>
    <span>R$ 99</span>
    <button onclick="addToCart('Perfume Importado')">Adicionar</button>
  </div>

</section>

<section class="carrinho">
  <h2>Seu Carrinho</h2>
  <ul id="cartList"></ul>

  <button onclick="finalizarCompra()">Finalizar no WhatsApp</button>
</section>

<script src="script.js"></script>
</body>
</html>
